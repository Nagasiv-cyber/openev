name: ArbitrageTradingEnv
version: "1.0.0"
description: "Realistic multi-market trading environment for arbitrage detection and portfolio optimization."

environment:
  dockerfile: "Dockerfile"
  endpoints:
    reset: "/reset"
    step: "/step/{session_id}"
    state: "/state/{session_id}"
    grade: "/grade/{session_id}"

tasks:
  - id: "easy"
    name: "Capital Survival (Easy)"
    description: "Maintain a final net worth greater than the initial starting cash."
    reward_range: [0.0, 1.0]
    grader: "/grade/{session_id}"

  - id: "medium"
    name: "Arbitrage Hunter (Medium)"
    description: "Detect and capture at least 5 simulated arbitrage opportunities."
    reward_range: [0.0, 1.0]
    grader: "/grade/{session_id}"

  - id: "hard"
    name: "Drawdown Control (Hard)"
    description: "Maintain maximum drawdown below 5% while remaining profitable."
    reward_range: [0.0, 1.0]
    grader: "/grade/{session_id}"

agent:
  inference_entrypoint: "inference.py"
  requirements: "requirements.txt"
