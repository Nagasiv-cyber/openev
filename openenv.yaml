name: CodeReviewEnv
version: "2.0.0"
description: "AI-powered code vulnerability detection benchmark. Agents review code snippets and must correctly APPROVE safe code or REJECT vulnerable code, with correct severity and explanation."

environment:
  dockerfile: "Dockerfile"
  endpoints:
    reset: "/reset"
    step: "/step/{session_id}"
    state: "/state/{session_id}"

tasks:
  - id: "easy"
    name: "Beginner Security Review"
    description: "Review code snippets for obvious vulnerabilities like SQL injection and XSS. Snippet difficulty is low."
    reward_range: [0, 1]
    grader: "/grade/easy/{session_id}"

  - id: "medium"
    name: "Intermediate Security Review"
    description: "Review code snippets for moderate vulnerabilities like path traversal and command injection."
    reward_range: [0, 1]
    grader: "/grade/medium/{session_id}"

  - id: "hard"
    name: "Advanced Security Review"
    description: "Review code snippets for subtle vulnerabilities like timing attacks and open redirects."
    reward_range: [0, 1]
    grader: "/grade/hard/{session_id}"

agent:
  inference_entrypoint: "inference.py"
  requirements: "requirements.txt"
