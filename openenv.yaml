spec_version: "1.0"

environment:
  name: "CyberGuard Code Review"
  description: "AI security code review benchmark. Agents APPROVE/REJECT code snippets across 3 difficulty tiers."
  version: "2.0.0"
  dockerfile: "Dockerfile"
  endpoints:
    reset: "/reset"
    step: "/step/{session_id}"
    state: "/state/{session_id}"

tasks:
  - id: easy
    name: "Beginner Security Review"
    description: "Review code snippets for obvious vulnerabilities: SQL injection, XSS, hardcoded credentials."
    reward_range: [0.1, 0.99]
    grader: "openev.server.grader:grade_easy"

  - id: medium
    name: "Intermediate Security Review"
    description: "Review code snippets for moderate vulnerabilities: path traversal, command injection, eval injection."
    reward_range: [0.1, 0.99]
    grader: "openev.server.grader:grade_medium"

  - id: hard
    name: "Advanced Security Review"
    description: "Review code snippets for subtle vulnerabilities: timing attacks, unsafe deserialization, open redirects."
    reward_range: [0.1, 0.99]
    grader: "openev.server.grader:grade_hard"

agent:
  inference_entrypoint: "inference.py"
  requirements: "requirements.txt"
